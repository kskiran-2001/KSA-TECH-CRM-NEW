<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Edit Customer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef4ff;
font-family:Arial;
}

.card{
margin-top:40px;
border-radius:20px;
box-shadow:0px 5px 20px rgba(0,0,0,.15);
}

.card-header{
background:linear-gradient(90deg,#0d6efd,#6610f2);
color:white;
font-size:28px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">
✏ Edit Customer
</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Customer Name</label>
<input type="text" name="name" class="form-control"
value="{{ customer['name'] }}" required>
</div>

<div class="col-md-6 mb-3">
<label>Customer Number</label>
<input type="text" name="number" class="form-control"
value="{{ customer['number'] }}" required>
</div>

<div class="col-md-12 mb-3">
<label>Address</label>
<textarea name="address" class="form-control" rows="3">{{ customer['address'] }}</textarea>
</div>

<div class="col-md-6 mb-3">
<label>Camera Brand</label>

<select name="brand" class="form-select">

<option {% if customer['brand']=="CP Plus" %}selected{% endif %}>CP Plus</option>

<option {% if customer['brand']=="Hikvision" %}selected{% endif %}>Hikvision</option>

<option {% if customer['brand']=="Dahua" %}selected{% endif %}>Dahua</option>

<option {% if customer['brand']=="TVT" %}selected{% endif %}>TVT</option>

<option {% if customer['brand']=="Trueview" %}selected{% endif %}>Trueview</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label>Number of Cameras</label>
<input type="number" name="camera" class="form-control"
value="{{ customer['camera'] }}">
</div>

<div class="col-md-6 mb-3">
<label>Installation Date</label>
<input type="date" name="install_date" class="form-control"
value="{{ customer['install_date'] }}">
</div>

<div class="col-md-6 mb-3">
<label>Next Service Date</label>
<input type="date" name="next_service" class="form-control"
value="{{ customer['next_service'] }}">
</div>

<div class="col-md-6 mb-3">
<label>Status</label>

<select name="status" class="form-select">

<option {% if customer['status']=="Installed" %}selected{% endif %}>Installed</option>

<option {% if customer['status']=="Pending" %}selected{% endif %}>Pending</option>

<option {% if customer['status']=="Service Due" %}selected{% endif %}>Service Due</option>

</select>

</div>

</div>

<button class="btn btn-success btn-lg">
💾 Update Customer
</button>

<a href="/" class="btn btn-secondary btn-lg">
⬅ Back
</a>

</form>

</div>

</div>

</div>

</body>
</html>
<div class="col-md-6 mb-3">

<label>Status</label>

<select name="status" class="form-select">

    <option>Installed</option>

    <option>Pending Installation</option>

    <option>Service Due</option>

    <option>Under Service</option>

    <option>AMC Active</option>

    <option>AMC Expired</option>

    <option>Complaint Open</option>

    <option>Complaint Closed</option>

    <option>Completed</option>

    <option>Cancelled</option>

    <option>Follow Up</option>

    <option>Quotation Sent</option>

</select>

</div>
<div class="col-md-6 mb-3">

<label>Total Amount (₹)</label>

<input
type="number"
name="total_amount"
class="form-control"
placeholder="Enter Total Amount">

</div>

<div class="col-md-6 mb-3">

<label>Advance Amount (₹)</label>

<input
type="number"
name="advance_amount"
class="form-control"
placeholder="Enter Advance Amount">

</div>

<div class="col-md-6 mb-3">

<label>Balance Amount (₹)</label>

<input
type="number"
name="balance_amount"
class="form-control"
placeholder="Enter Balance Amount">

</div>

<div class="col-md-6 mb-3">

<label>Payment Status</label>

<select
name="payment_status"
class="form-select">

<option>Paid</option>

<option>Advance Paid</option>

<option>Partially Paid</option>

<option>Unpaid</option>

</select>

</div>
