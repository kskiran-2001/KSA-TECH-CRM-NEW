<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Customer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#eef4ff;
font-family:Arial;
}

.card{
margin-top:40px;
border-radius:20px;
box-shadow:0px 5px 20px rgba(0,0,0,.15);
}

.card-header{
background:linear-gradient(90deg,#0047FF,#6A11CB);
color:white;
font-size:28px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="card-header">

➕ Add New Customer

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Customer Name</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Customer Number</label>

<input
type="text"
name="number"
class="form-control"
required>

</div>

<div class="col-md-12 mb-3">

<label>Address</label>

<textarea
name="address"
class="form-control"
rows="3"></textarea>

</div>

<div class="col-md-6 mb-3">

<label>Camera Brand</label>

<select
name="brand"
class="form-select">

<option>CP Plus</option>

<option>Hikvision</option>

<option>Dahua</option>

<option>Trueview</option>

<option>TVT</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Number of Cameras</label>

<input
type="number"
name="camera"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Installation Date</label>

<input
type="date"
name="install_date"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Next Service Date</label>

<input
type="date"
name="next_service"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Status</label>

<select
name="status"
class="form-select">

<option>Installed</option>

<option>Pending</option>

<option>Service Due</option>

</select>

</div>

</div>

<button
type="submit"
class="btn btn-success btn-lg">

💾 Save Customer

</button>

<a
href="/"
class="btn btn-secondary btn-lg">

Back

</a>

</form>

</div>

</div>

</div>

</body>

</html>

<td>

    💾 Save Customer
</button>

<a href="/" class="btn btn-secondary btn-lg">
    ⬅ Back
</a>

</form>

</div>

</div>

</div>

</body>

</html>

<div class="input-group">

<input
type="text"
name="q"
class="form-control"
placeholder="Search Customer Name or Mobile Number">

<button class="btn btn-primary">

🔍 Search

</button>

</div>

</form>
<button type="submit" class="btn btn-success btn-lg">
    💾 Save Customer
</button>

<a href="/" class="btn btn-secondary btn-lg">
    Back
</a>

</form>

</div>

</div>

</div>

</body>
</html>
